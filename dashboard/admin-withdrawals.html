<!DOCTYPE html>
<html lang="en">
<head>
<script src="admin-guard.js"></script>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Cash Flow | DigiMoms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-100 font-sans p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-3xl font-black uppercase italic tracking-tighter text-indigo-500">Finance & Personal Payout</h2>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Track money you take from Paytm</p>
            </div>
            <div id="ai-status" class="bg-indigo-900/30 text-indigo-300 px-4 py-2 rounded-xl text-[10px] font-black border border-indigo-500/20">
                <i class="fas fa-brain mr-2 animate-pulse"></i> AI FINANCE ADVISOR ACTIVE
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Record New Entry -->
            <div class="bg-slate-900 p-8 rounded-[3rem] border border-slate-800 shadow-2xl">
                <h3 class="font-black uppercase text-sm mb-6 text-emerald-400">Record Withdrawal</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Amount to Withdraw (₹)</label>
                        <input type="number" id="admAmount" placeholder="0.00" class="w-full p-4 bg-slate-950 border border-slate-800 rounded-2xl outline-none focus:border-emerald-500 transition font-black text-xl text-emerald-400">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Reason / Note</label>
                        <textarea id="admNote" placeholder="e.g. Personal use, Office rent..." class="w-full p-4 bg-slate-950 border border-slate-800 rounded-2xl h-24 outline-none focus:border-indigo-500 transition text-sm"></textarea>
                    </div>
                    <button onclick="saveAdminCash()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all transform active:scale-95 uppercase tracking-widest text-xs">Confirm & Save Record</button>
                </div>

                <div class="mt-8 p-6 bg-indigo-950/50 rounded-3xl border border-indigo-500/20">
                    <p class="text-[10px] font-black text-indigo-300 uppercase mb-2">Smart Ratio Advice</p>
                    <p id="smart-advice" class="text-xs font-bold text-slate-400 italic">Calculating safe limits...</p>
                </div>
            </div>

            <!-- Right: History & Totals -->
            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800">
                        <p class="text-[10px] font-bold text-slate-500 uppercase">Current Business Profit</p>
                        <h4 id="total-biz-profit" class="text-2xl font-black text-white">₹0.00</h4>
                    </div>
                    <div class="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800">
                        <p class="text-[10px] font-bold text-slate-500 uppercase">Total You Have Taken</p>
                        <h4 id="total-personal" class="text-2xl font-black text-indigo-400">₹0.00</h4>
                    </div>
                </div>

                <!-- History Table -->
                <div class="bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden shadow-xl">
                    <div class="p-6 bg-slate-800/30 border-b border-slate-800 flex justify-between items-center">
                        <h4 class="text-[10px] font-black uppercase tracking-widest">Withdrawal History</h4>
                        <i class="fas fa-history text-slate-600"></i>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[10px] font-bold uppercase">
                            <thead class="bg-slate-950 text-slate-600">
                                <tr>
                                    <th class="p-4">Date</th>
                                    <th class="p-4">Reason</th>
                                    <th class="p-4">Amount</th>
                                    <th class="p-4 text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="withdraw-list-body" class="divide-y divide-slate-800">
                                <!-- Data will load here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://laakhawalhjkejafhtvf.supabase.co'; 
        const supabaseKey = 'sb_publishable_H755KJqOuQ1qqrGWtYNlLw_WIgsRvG8';
        const mySupabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function initFinance() {
            // ১. মোট বিজনেস প্রফিট হিসাব করা (Completed Leads থেকে)
            const { data: leads } = await mySupabase.from('leads').select('plan_type').eq('status', 'completed');
            let gross = 0;
            leads.forEach(l => {
                if(l.plan_type === 'Starter') gross += 749;
                else if(l.plan_type === 'Business') gross += 549;
                else if(l.plan_type === 'Premium') gross += 6499;
            });

            // ২. নিজের নেওয়া মোট টাকা আনা
            const { data: logs } = await mySupabase.from('admin_cash_logs').select('*').order('created_at', {ascending: false});
            let totalTaken = logs ? logs.reduce((sum, item) => sum + item.amount, 0) : 0;

            document.getElementById('total-biz-profit').innerText = '₹' + gross.toFixed(2);
            document.getElementById('total-personal').innerText = '₹' + totalTaken.toFixed(2);

            // ৩. স্মার্ট পরামর্শ (৮০/২০ নিয়ম)
            let remaining = gross - totalTaken;
            if (remaining > 1000) {
                document.getElementById('smart-advice').innerText = "Safe to take ₹" + (remaining * 0.8).toFixed(0) + " more. Keep ₹" + (remaining * 0.2).toFixed(0) + " as buffer.";
                document.getElementById('smart-advice').className = "text-xs font-bold text-emerald-400 italic";
            } else {
                document.getElementById('smart-advice').innerText = "Danger! Profit is low. Stop personal withdrawals until next sale.";
                document.getElementById('smart-advice').className = "text-xs font-bold text-red-400 italic";
            }

            // ৪. লিস্ট দেখানো
            const body = document.getElementById('withdraw-list-body');
            body.innerHTML = "";
            if(logs) {
                logs.forEach(log => {
                    body.innerHTML += `
                    <tr class="hover:bg-white/5 transition">
                        <td class="p-4 text-slate-500">${new Date(log.created_at).toLocaleDateString()}</td>
                        <td class="p-4 text-white">${log.note || 'Personal Withdrawal'}</td>
                        <td class="p-4 text-emerald-400">₹${log.amount}</td>
                        <td class="p-4 text-center"><button onclick="deleteLog(${log.id})" class="text-red-900 hover:text-red-500 transition"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
                });
            }
        }

        async function saveAdminCash() {
            const amt = parseFloat(document.getElementById('admAmount').value);
            const note = document.getElementById('admNote').value;
            if(!amt || amt <= 0) return alert("Enter valid amount!");

            const { error } = await mySupabase.from('admin_cash_logs').insert([{ amount: amt, note: note, type: 'personal_withdrawal' }]);
            if(!error) {
                alert("Withdrawal Saved!");
                location.reload();
            }
        }

        async function deleteLog(id) {
            if(confirm("Delete this record?")) {
                await mySupabase.from('admin_cash_logs').delete().eq('id', id);
                location.reload();
            }
        }

        window.onload = initFinance;
    </script>
</body>
</html>
