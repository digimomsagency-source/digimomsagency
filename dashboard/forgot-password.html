<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Instant Recovery | DigiMoms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 border-t-8 border-indigo-600">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-slate-800 uppercase tracking-tighter">Instant Reset</h1>
            <p class="text-slate-400 text-xs font-bold uppercase mt-1">Change your password instantly</p>
        </div>

        <form id="recoverForm" class="space-y-5">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Phone Number</label>
                <input type="tel" id="phone" required placeholder="Registered Number" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-indigo-500">
            </div>
            
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Your Recovery Key</label>
                <input type="text" id="rKey" required placeholder="DM-XXXXXX" class="w-full p-4 bg-indigo-50 border-2 border-indigo-100 rounded-2xl font-bold uppercase text-indigo-700 outline-none">
            </div>
            
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">New Password</label>
                <input type="password" id="newPass" required placeholder="Min 6 Characters" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none">
            </div>

            <button type="submit" id="mainBtn" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-slate-800 transition-all uppercase tracking-widest text-xs">Reset Now</button>
        </form>
        
        <a href="login.html" class="block text-center mt-6 text-[10px] font-black text-indigo-400 uppercase tracking-widest hover:text-indigo-600 transition">Return to Login</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://laakhawalhjkejafhtvf.supabase.co'; 
        const supabaseKey = 'sb_publishable_H755KJqOuQ1qqrGWtYNlLw_WIgsRvG8';
        const mySupabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('recoverForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const key = document.getElementById('rKey').value.toUpperCase();
            const newPass = document.getElementById('newPass').value;
            const btn = document.getElementById('mainBtn');

            if(newPass.length < 6) return alert("Password must be at least 6 characters!");

            btn.innerText = "Processing..."; btn.disabled = true;

            try {
                // আমরা আমাদের তৈরি করা SQL ফাংশন (RPC) কল করছি
                const { data: success, error } = await mySupabase.rpc('auto_reset_password', {
                    p_phone: phone,
                    p_key: key,
                    p_new_password: newPass
                });

                if (error) throw error;

                if (success) {
                    alert("SUCCESS!\nYour password has been updated. You can now login with your new password.");
                    window.location.href = 'login.html';
                } else {
                    alert("FAILED!\nInvalid Phone Number or Recovery Key. Please check and try again.");
                    btn.innerText = "Reset Now"; btn.disabled = false;
                }

            } catch (err) {
                alert("Error: " + err.message);
                btn.innerText = "Reset Now"; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
