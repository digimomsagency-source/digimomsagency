<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DigiMoms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10">
        <div class="text-center mb-10">
            <div class="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"><i class="fas fa-lock text-white text-2xl"></i></div>
            <h1 class="text-3xl font-black text-slate-800 uppercase tracking-tight">Worker Login</h1>
        </div>

        <form class="space-y-6" id="loginForm">
            <input type="tel" id="loginPhone" required placeholder="WhatsApp Number" class="w-full px-6 py-4 rounded-2xl border border-slate-100 focus:ring-2 focus:ring-indigo-600 outline-none bg-slate-50 font-bold text-slate-800">
            <input type="password" id="loginPass" required placeholder="Password" class="w-full px-6 py-4 rounded-2xl border border-slate-100 focus:ring-2 focus:ring-indigo-600 outline-none bg-slate-50 font-bold text-slate-800">
            <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl transition-all uppercase tracking-widest text-sm">Login</button>
            <p class="text-center text-[10px] font-black text-slate-400 uppercase mt-4">New to DigiMoms? <a href="register.html" class="text-indigo-600 hover:underline">Create Account</a></p>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://laakhawalhjkejafhtvf.supabase.co'; 
        const supabaseKey = 'sb_publishable_H755KJqOuQ1qqrGWtYNlLw_WIgsRvG8';
        const mySupabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('loginPhone').value;
            const password = document.getElementById('loginPass').value;
            const btn = document.getElementById('submitBtn');

            btn.innerText = "Checking..."; btn.disabled = true;

            try {
                const { data, error } = await mySupabase.auth.signInWithPassword({
                    email: phone + '@digimoms.com',
                    password: password
                });

                if (error) throw error;

                // প্রোফাইল চেক (এখানেই এরর আসছিল, এখন ফিক্সড)
                const { data: profile, error: pError } = await mySupabase
                    .from('profiles').select('*').eq('id', data.user.id).single();

                if (!profile) {
                    alert("Profile Data Missing! Please Register again with a NEW NUMBER.");
                    await mySupabase.auth.signOut();
                    location.reload();
                    return;
                }

                if (profile.is_suspended) {
                    alert("Account Suspended!");
                    await mySupabase.auth.signOut();
                    location.reload();
                    return;
                }

                if (!profile.is_approved) {
                    alert("Waiting for Admin Approval!");
                    await mySupabase.auth.signOut();
                    location.reload();
                    return;
                }

                window.location.href = 'index.html';

            } catch (err) {
                alert("Login Failed: " + err.message);
                btn.innerText = "Login"; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
