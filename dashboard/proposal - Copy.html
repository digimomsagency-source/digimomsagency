<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Dept | DigiMoms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 font-sans text-slate-100">
    <nav class="bg-black/20 p-4 border-b border-white/5 backdrop-blur-xl flex justify-between sticky top-0 z-50">
        <div class="flex items-center space-x-4"><a href="index.html" class="bg-white/10 p-2 rounded-xl"><i class="fas fa-arrow-left"></i></a><h1 class="font-black uppercase tracking-widest text-sm text-indigo-400">Proposal Center</h1></div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div class="flex space-x-2 mb-10 bg-black/20 p-1 rounded-2xl w-fit mx-auto overflow-x-auto">
            <button onclick="showTab('market')" id="tab-market" class="px-6 py-3 rounded-xl font-black text-[10px] uppercase bg-white text-slate-900 shadow-xl">Public Market</button>
            <button onclick="showTab('vault')" id="tab-vault" class="px-6 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400">My Private Leads</button>
            <button onclick="showTab('active')" id="tab-active" class="px-6 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400">Active Dealing</button>
            <button onclick="showTab('history')" id="tab-history" class="px-6 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400">My History</button>
        </div>

        <div id="sec-market" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="sec-vault" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="sec-active" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="sec-history" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://laakhawalhjkejafhtvf.supabase.co'; 
        const supabaseKey = 'sb_publishable_H755KJqOuQ1qqrGWtYNlLw_WIgsRvG8';
        const mySupabase = supabase.createClient(supabaseUrl, supabaseKey);
        let curId = null;

        async function init() {
            const { data: { session } } = await mySupabase.auth.getSession();
            if(!session) { window.location.href='login.html'; return; }
            curId = session.user.id; showTab('market');
        }

        function showTab(t) {
            ['market','vault','active','history'].forEach(s => { document.getElementById('sec-'+s).classList.add('hidden'); document.getElementById('tab-'+s).className = "px-6 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400"; });
            document.getElementById('sec-'+t).classList.remove('hidden');
            document.getElementById('tab-'+t).className = "px-6 py-3 rounded-xl font-black text-[10px] uppercase bg-white text-slate-900 shadow-xl";
            if(t === 'market') loadMarket(); if(t === 'vault') loadVault(); if(t === 'active') loadActive(); if(t === 'history') loadHistory();
        }

        async function loadMarket() {
            const sixtyDaysAgo = new Date(new Date().setDate(new Date().getDate() - 60)).toISOString();
            const { data: leads } = await mySupabase.from('leads').select('*').or(`status.eq.pending,and(status.eq.rejected,rejected_at.lt.${sixtyDaysAgo})`).eq('is_private', false);
            render(leads, 'sec-market', 'market');
        }

        async function loadVault() {
            const { data: leads } = await mySupabase.from('leads').select('*').eq('worker_id', curId).eq('is_private', true).neq('status', 'completed');
            render(leads, 'sec-vault', 'vault');
        }

        async function loadActive() {
            const { data: leads } = await mySupabase.from('leads').select('*').eq('closer_id', curId).eq('status', 'proposal');
            render(leads, 'sec-active', 'active');
        }

        async function loadHistory() {
            const { data: leads } = await mySupabase.from('leads').select('*').eq('closer_id', curId).eq('status', 'completed');
            render(leads, 'sec-history', 'history');
        }

        function render(leads, container, type) {
            const div = document.getElementById(container);
            if(!leads || leads.length === 0) { div.innerHTML = '<p class="col-span-full text-center py-20 font-bold opacity-20 uppercase text-xs">NO DATA FOUND</p>'; return; }
            let h = "";
            leads.forEach(l => {
                const isLocked = (type === 'market');
                h += `<div class="bg-white/5 border border-white/10 p-8 rounded-[2.5rem] shadow-2xl transition hover:border-indigo-500/50">
                    <div class="flex justify-between mb-4"><span class="bg-indigo-600 px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-tighter">${l.plan_type}</span><span class="text-[9px] font-bold text-slate-500">#${l.id}</span></div>
                    <h3 class="text-2xl font-black text-white">${l.business_name}</h3>
                    ${isLocked ? `
                        <p class="text-xs font-bold text-slate-400 mt-4 mb-8">Location: ${l.business_location || 'HIDDEN'}</p>
                        <button onclick="act(${l.id},'accept')" class="w-full bg-white text-slate-900 font-black py-5 rounded-2xl hover:bg-indigo-500 hover:text-white transition uppercase text-xs tracking-widest">Accept Lead</button>
                    ` : `
                        <div class="my-6 p-4 bg-emerald-500/5 rounded-2xl border border-emerald-500/20 text-xs font-bold text-emerald-400">
                            <p>PHONE: ${l.customer_phone}</p><p>WA: ${l.whatsapp_number || 'N/A'}</p><p>ADD: ${l.business_location}</p>
                        </div>
                        ${type !== 'history' ? `
                        <div class="space-y-3">
                            <a href="https://wa.me/${l.whatsapp_number || l.customer_phone}" target="_blank" class="flex justify-between items-center bg-emerald-600 text-white p-5 rounded-2xl font-black text-xs uppercase hover:bg-emerald-500 transition">WhatsApp Client <i class="fab fa-whatsapp text-xl"></i></a>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="act(${l.id},'agree')" class="bg-indigo-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase">Agreed</button>
                                <button onclick="act(${l.id},'reject')" class="bg-red-900/50 text-red-500 py-4 rounded-2xl font-black text-[10px] uppercase">Reject</button>
                            </div>
                        </div>` : '<p class="text-emerald-500 font-black text-center text-xs uppercase">✓ Completed</p>'}
                    `}
                </div>`;
            });
            div.innerHTML = h;
        }

        async function act(id, task) {
            if(task==='accept') await mySupabase.from('leads').update({status:'proposal', closer_id: curId}).eq('id',id);
            if(task==='agree') await mySupabase.from('leads').update({status:'approved_by_proposal', closer_id: curId}).eq('id',id);
            if(task==='reject') await mySupabase.from('leads').update({status:'rejected', rejected_at: new Date().toISOString()}).eq('id',id);
            alert("Action Updated!"); location.reload();
        }
        window.onload = init;
    </script>
</body>
</html>
