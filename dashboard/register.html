<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join DigiMoms | Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-indigo-50 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-indigo-100">
        <div class="bg-indigo-700 p-8 text-white text-center">
            <h1 class="text-2xl font-black uppercase tracking-tight">Partner Registration</h1>
            <p class="text-indigo-200 text-[10px] font-bold mt-1 uppercase tracking-widest">Join our high-income network</p>
        </div>

        <form class="p-8 space-y-4" id="regForm">
            <input type="text" id="fullName" required placeholder="Full Name" class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-600 bg-slate-50 font-bold text-slate-800">
            <input type="tel" id="phone" required placeholder="Your WhatsApp Number" class="w-full p-4 rounded-2xl border border-slate-200 outline-none bg-slate-50 font-bold text-slate-800">
            
            <!-- রেফারেল নম্বর ফিল্ড -->
            <div class="space-y-1">
                <label class="text-[9px] font-black text-indigo-600 uppercase ml-2">Referral Mobile Number (Optional)</label>
                <input type="tel" id="refPhone" placeholder="Friend's Mobile Number" class="w-full p-4 rounded-2xl border border-indigo-100 outline-none bg-indigo-50/30 font-bold">
            </div>

            <input type="password" id="pass" required placeholder="Create Password" class="w-full p-4 rounded-2xl border border-slate-200 outline-none bg-slate-50 font-bold">

            <div class="bg-indigo-50 p-6 rounded-[2rem] border-2 border-dashed border-indigo-200 text-center">
                <p class="text-[10px] font-black text-indigo-800 uppercase mb-2">Upload Govt ID (Aadhar/Voter)</p>
                <input type="file" id="govtID" required class="text-xs">
            </div>

            <button type="submit" id="regBtn" class="w-full bg-indigo-700 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-slate-900 transition-all uppercase tracking-widest text-sm">Register & Get Recovery Key</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://laakhawalhjkejafhtvf.supabase.co'; 
        const supabaseKey = 'sb_publishable_H755KJqOuQ1qqrGWtYNlLw_WIgsRvG8';
        const mySupabase = supabase.createClient(supabaseUrl, supabaseKey);

        function makeKey() {
            let res = 'DM-'; const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            for (let i = 0; i < 6; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return res;
        }

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const file = document.getElementById('govtID').files[0];
            const phone = document.getElementById('phone').value;
            const refPhone = document.getElementById('refPhone').value;
            const rKey = makeKey();

            btn.innerText = "Processing..."; btn.disabled = true;

            try {
                // ১. রেফারার আইডি খুঁজে বের করা (যদি কেউ রেফারেল নম্বর দেয়)
                let referrerId = null;
                if(refPhone) {
                    const { data: refUser } = await mySupabase.from('profiles').select('id').eq('phone', refPhone).single();
                    if(refUser) referrerId = refUser.id;
                }

                // ২. সুপাবেস অথ অ্যাকাউন্ট তৈরি
                const { data: auth, error: aErr } = await mySupabase.auth.signUp({
                    email: phone + '@digimoms.com', password: document.getElementById('pass').value
                });
                if(aErr) throw aErr;

                // ৩. আইডি কার্ড আপলোড
                const fileName = `id_${phone}_${Date.now()}.jpg`;
                await mySupabase.storage.from('kyc-documents').upload(fileName, file);
                const fileUrl = `${supabaseUrl}/storage/v1/object/public/kyc-documents/${fileName}`;

                // ৪. প্রোফাইল সেভ (Referrer ID সহ)
                const { error: pErr } = await mySupabase.from('profiles').insert([{
                    id: auth.user.id,
                    full_name: document.getElementById('fullName').value,
                    phone: phone,
                    govt_id_url: fileUrl,
                    recovery_key: rKey,
                    referrer_id: referrerId, // এখানে রেফারারের আইডি সেভ হবে
                    wallet_balance: 0,
                    locked_bonus: 50
                }]);
                if(pErr) throw pErr;

                alert(`SUCCESS!\n\nYOUR RECOVERY KEY: ${rKey}\n\nIMPORTANT: Save this key to reset password!`);
                window.location.href = 'login.html';

            } catch (err) { alert(err.message); btn.innerText = "Register"; btn.disabled = false; }
        });
    </script>
</body>
</html>
