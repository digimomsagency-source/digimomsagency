<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Rewards | DigiMoms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans text-slate-900 p-6 md:p-10">

    <div class="max-w-4xl mx-auto">
        <h2 class="text-3xl font-black uppercase italic tracking-tighter text-slate-800 mb-10 text-center">Reward Tracking Center</h2>
        
        <div id="reward-container" class="space-y-8">
            <p class="text-center py-20 opacity-30 font-bold uppercase">Syncing your records...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://laakhawalhjkejafhtvf.supabase.co'; 
        const supabaseKey = 'sb_publishable_H755KJqOuQ1qqrGWtYNlLw_WIgsRvG8';
        const mySupabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function init() {
            const { data: { session } } = await mySupabase.auth.getSession();
            const { data: prof } = await mySupabase.from('profiles').select('sale_count').eq('id', session.user.id).single();
            const { data: rewards } = await mySupabase.from('rewards').select('*').eq('worker_id', session.user.id).order('created_at', {ascending: false});
            
            const div = document.getElementById('reward-container');
            div.innerHTML = "";

            if (prof.sale_count < 5) {
                // ৫ সেলের কম হলে লক থাকবে
                div.innerHTML = `<div class="bg-white p-16 rounded-[3.5rem] shadow-2xl text-center border-b-8 border-indigo-600">
                    <i class="fas fa-lock text-5xl text-slate-200 mb-6"></i>
                    <h3 class="text-2xl font-black uppercase italic">Gift Locked</h3>
                    <p class="text-slate-500 mt-4 max-w-sm mx-auto">কমপক্ষে ৫টি সেল সফলভাবে সম্পন্ন করলেই আপনার জন্য অপেক্ষা করছে বিশেষ চমক! আপনার বর্তমান প্রগ্রেস: <b>${prof.sale_count}/5</b></p>
                </div>`;
            } else if (!rewards || rewards.length === 0) {
                // ৫ সেল হয়েছে কিন্তু অ্যাডমিন এখনও গিফট সেট করেনি
                div.innerHTML = `<div class="bg-white p-16 rounded-[3.5rem] shadow-2xl text-center border-b-8 border-emerald-500">
                    <i class="fas fa-award text-5xl text-emerald-500 mb-6 animate-bounce"></i>
                    <h3 class="text-2xl font-black uppercase italic">Achievement Unlocked!</h3>
                    <p class="text-slate-500 mt-4">অভিনন্দন! আপনি ৫টি সেলের টার্গেট পূর্ণ করেছেন। আমাদের অ্যাডমিন টিম আপনার <b>Welcome Kit</b> প্রস্তুত করছে। শীঘ্রই এখানে আপডেট পাবেন।</p>
                </div>`;
            } else {
                // গিফট লিস্ট এবং ট্র্যাকিং
                rewards.forEach(r => {
                    div.innerHTML += `
                    <div class="bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden relative">
                        <div class="bg-indigo-700 p-8 text-white flex justify-between items-center">
                            <div>
                                <span class="bg-white/20 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">${r.status}</span>
                                <h4 class="text-xl font-black mt-2 uppercase tracking-tighter italic">Your Reward Shipment</h4>
                            </div>
                            <i class="fas fa-gift text-4xl opacity-30"></i>
                        </div>
                        <div class="p-8 space-y-6">
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Items in Package:</p>
                                <p class="text-lg font-bold text-slate-800">${r.items_list}</p>
                            </div>
                            
                            ${r.tracking_id ? `
                            <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                                <div>
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Tracking ID</p>
                                    <p class="text-sm font-black text-indigo-600">${r.tracking_id}</p>
                                </div>
                                <a href="${r.tracking_link}" target="_blank" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-[10px] uppercase hover:bg-indigo-600 transition shadow-lg">Track on Courier Website</a>
                            </div>
                            ` : `<p class="text-[10px] font-bold text-amber-600 uppercase italic">Courier tracking will be added soon...</p>`}
                        </div>
                    </div>`;
                });
            }
        }
        window.onload = init;
    </script>
</body>
</html>
